name: 🔎 PR Check — Lint & Build

on:
  pull_request:
    branches: [main]
    paths:
      - 'llm_service/**'
      - 'azure/**'
      - '.github/workflows/**'
      - 'docker-compose.yml'

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Lint
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: llm_service/requirements.txt

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff check
        run: ruff check llm_service/ --select E,W,F --ignore E501 --output-format github

      - name: Validate Bicep syntax
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az bicep build --file azure/container-apps.bicep

  # ─────────────────────────────────────────────────────────────────────────
  # Build test (no push)
  # ─────────────────────────────────────────────────────────────────────────
  build-test:
    name: 🐳 Build Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./llm_service
          file: ./llm_service/Dockerfile
          push: false
          load: true
          tags: test-api:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./llm_service
          file: ./llm_service/Dockerfile.worker
          push: false
          load: true
          tags: test-worker:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test API image
        run: |
          echo "Running container startup test..."
          docker run --rm -d \
            --name api-smoke-test \
            -p 8001:8001 \
            -e GEMINI_API_KEY=test-key \
            -e QDRANT_URL=http://nonexistent \
            -e CLOUDAMQP_URL="" \
            -e ALLOWED_ORIGINS="*" \
            test-api:pr-${{ github.event.pull_request.number }} \
            uvicorn main:app --host 0.0.0.0 --port 8001 &

          sleep 15

          # Check process started (health will fail due to missing Qdrant but FastAPI should start)
          if docker ps | grep api-smoke-test; then
            echo "✅ API container started successfully"
            docker stop api-smoke-test || true
          else
            echo "❌ API container failed to start"
            docker logs api-smoke-test || true
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # PR Summary
  # ─────────────────────────────────────────────────────────────────────────
  pr-summary:
    name: 📋 PR Summary
    runs-on: ubuntu-latest
    needs: [lint, build-test]
    if: always()
    steps:
      - name: Post PR check summary
        run: |
          echo "## PR Check Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint | ${{ needs.lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build Test | ${{ needs.build-test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> ✅ Merge to \`main\` will trigger automatic deployment to Azure" >> "$GITHUB_STEP_SUMMARY"
