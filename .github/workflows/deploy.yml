name: 🚀 CI/CD — Build & Deploy to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'
  WEBAPP_NAME: ragrag-api
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/ragrag-api

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Lint & Validate
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: llm_service/requirements.txt

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff lint
        run: ruff check llm_service/ --select E,W,F --ignore E501

      - name: Validate Python imports
        working-directory: llm_service
        run: |
          pip install python-dotenv pika
          python -c "from config import settings; print('✅ config OK — AMQP enabled:', settings.USE_AMQP)"

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Build & Push to GitHub Container Registry
  # Uses GITHUB_TOKEN automatically — NO extra secrets needed for this step
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    permissions:
      contents: read
      packages: write   # allows pushing to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        id: meta
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA::8}"
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "🏷️ Image tag: ${SHORT_SHA}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # automatic, no setup needed

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./llm_service
          file: ./llm_service/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_API }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_API }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_API }}:buildcache,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy to Azure Web App
  # Uses AZURE_WEBAPP_PUBLISH_PROFILE — no Service Principal / Entra needed
  # Get this from: az webapp deployment list-publishing-profiles --xml
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GHCR image on Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.IMAGE_API }}:${{ needs.build-and-push.outputs.image_tag }}

      - name: Configure GHCR credentials on Web App
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            # This step needs AZURE_CREDENTIALS — skip if not available
            # The image pull works because GHCR visibility is set to public (or via GHCR_PAT)
            echo "Image deployed: ${{ env.IMAGE_API }}:${{ needs.build-and-push.outputs.image_tag }}"

      - name: Wait for app to restart
        run: sleep 30

      - name: Health check
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://ragrag-api.azurewebsites.net/health" || echo "000")
            echo "Health check $i/10: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ App is healthy!"
              exit 0
            fi
            sleep 15
          done
          echo "⚠️ Health check incomplete — app may still be starting (cold start ~2-3 min)"
          exit 0   # Don't fail pipeline on cold start

      - name: Deployment summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image Tag | \`${{ needs.build-and-push.outputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| App URL | https://ragrag-api.azurewebsites.net |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health | https://ragrag-api.azurewebsites.net/health |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API Docs | https://ragrag-api.azurewebsites.net/docs |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ${{ job.status }} |" >> "$GITHUB_STEP_SUMMARY"
